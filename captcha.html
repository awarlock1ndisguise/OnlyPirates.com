<html class="scroll-smooth">
   
  <head>

 </head>

 <body>
   


    <section class="relative w-full h-screen flex items-center justify-center">

        ">

              Select all images containing a pirate
             
            </h1>
            <img src="pirate.webp" class="w-10 h-10">
        </div>
        
        <div class="mt-8 ">

            <div class="grid grid-cols-3 gap-2 ">
                <img id="r1n1" src="row-1-column-1.png.webp" class="w-24 h-24 object-cover cursor-pointer">
                <img id="r1n2" src="row-1-column-2.png" class="w-24 h-24 object-cover cursor-pointer">

                <img id="r3n3" src="row-3-column-3.png" class="w-24 h-24 object-cover cursor-pointer">

            </div>
        </div>

        <div class="flex items-center justify-center gap-16">

        <div id="check" class="flex items-left justify-start mt-6">
            <i class="fa-solid fa-check text-white cursor-pointer"></i>
        </div>
        <div id="reset" class="flex items-right justify-end mt-6">
            <i class="fa-solid fa-arrow-rotate-right text-white cursor-pointer"></i>

        </div>
        </div>
